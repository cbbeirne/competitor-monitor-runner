name: Competitor Monitor — Weekly Run

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run competitor monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/run-monitor.js

      - name: Commit updated baselines
        run: |
          git config user.name "Competitor Monitor Bot"
          git config user.email "bot@corasystems.com"
          git add baselines/
          git diff --staged --quiet || git commit -m "Baseline update: $(date +%Y-%m-%d)"
          git push
